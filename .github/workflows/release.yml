name: release

# Publishes a self-contained Windows binary (app + bundled OTD daemon) as a GitHub Release.
# Trigger by pushing a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
# or run manually from the Actions tab with a tag input.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: write   # create the release + upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout (with OpenTabletDriver submodule)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0      # full history + tags, so the changelog step can diff against the previous tag
          fetch-tags: true

      - name: Set up .NET (app targets net10.0, daemon targets net8.0)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve tag / version
        id: ver
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.tag }}' } else { '${{ github.ref_name }}' }
          if ([string]::IsNullOrWhiteSpace($tag)) { throw "No tag resolved" }
          "tag=$tag"  >> $env:GITHUB_OUTPUT
          "zip=OpenTabletArtist-$tag-win-x64.zip" >> $env:GITHUB_OUTPUT
          # Numeric version (strip a leading 'v') stamped into the assembly for the in-app label.
          "version=$($tag -replace '^v','')" >> $env:GITHUB_OUTPUT
          Write-Host "Releasing $tag"

      # Gate the release on the test suite (build.yml tests every push/PR, but a tag could point
      # at any commit, so verify here too).
      - name: Test
        run: dotnet test tests/OpenTabletArtist.Tests/OpenTabletArtist.Tests.csproj -c Debug

      # Self-contained so end users need no .NET runtime installed. (Debug symbols are stripped from the
      # whole bundle just before zipping — see the "Strip debug symbols" step below.)
      - name: Publish app (self-contained win-x64)
        run: dotnet publish OpenTabletArtist/OpenTabletArtist.csproj -c Release -r win-x64 --self-contained -p:Version=${{ steps.ver.outputs.version }} -o publish/OpenTabletArtist

      # Bundle the OTD daemon next to the app in a Daemon/ subfolder — the app's daemon-locate
      # logic (DaemonExePaths) checks this path first, so auto-start works in the release.
      - name: Publish daemon into the app's Daemon/ folder
        run: dotnet publish external/OpenTabletDriver/OpenTabletDriver.Daemon/OpenTabletDriver.Daemon.csproj -c Release -r win-x64 --self-contained -o publish/OpenTabletArtist/Daemon

      # Bundle our pressure-curve OTD plugin so the app can install it into the daemon's plugin dir
      # at runtime (PressurePluginInstaller looks for BundledPlugins/<folder>/ next to the app first).
      - name: Bundle the pen-dynamics plugin
        shell: pwsh
        run: |
          dotnet build plugins/OpenTabletArtist.Dynamics/OpenTabletArtist.Dynamics.csproj -c Release
          $dest = "publish/OpenTabletArtist/BundledPlugins/OpenTabletArtistDynamics"
          New-Item -ItemType Directory -Force $dest | Out-Null
          Copy-Item "plugins/OpenTabletArtist.Dynamics/bin/Release/net8.0/OpenTabletArtist.Dynamics.dll" $dest

      # Bundle the Windows Ink plugin (newest compatible from the OTD Plugin-Repository) for offline
      # install (#364). Best-effort: a repo/layout change must never fail the release — the app still
      # installs it online. The bundle is the plugin DLLs + the manifest saved as metadata.json (what an
      # online install writes), so the app copies it straight into the daemon's plugin dir.
      - name: Bundle the Windows Ink plugin for offline install
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tmp = Join-Path $env:RUNNER_TEMP 'winink'
          New-Item -ItemType Directory -Force $tmp | Out-Null
          Invoke-WebRequest 'https://github.com/OpenTabletDriver/Plugin-Repository/archive/refs/heads/master.zip' -OutFile "$tmp/pr.zip"
          Expand-Archive "$tmp/pr.zip" "$tmp/pr" -Force
          # Pick the newest WindowsInk.json by its version folder (Repository/<version>/<owner>/...).
          $meta = Get-ChildItem "$tmp/pr" -Recurse -Filter WindowsInk.json |
            Sort-Object { [version]($_.FullName -replace '.*Repository[\\/]([0-9.]+)[\\/].*','$1') } -Descending |
            Select-Object -First 1
          if (-not $meta) { throw 'No WindowsInk.json found in the plugin repository' }
          $json = Get-Content $meta.FullName -Raw | ConvertFrom-Json
          $dest = 'publish/OpenTabletArtist/BundledPlugins/WindowsInk'
          New-Item -ItemType Directory -Force $dest | Out-Null
          Invoke-WebRequest $json.DownloadUrl -OutFile "$tmp/winink.zip"
          Expand-Archive "$tmp/winink.zip" $dest -Force
          Copy-Item $meta.FullName (Join-Path $dest 'metadata.json')
          Write-Host "Bundled Windows Ink plugin v$($json.PluginVersion) (supports OTD $($json.SupportedDriverVersion))"

      # Bundle the VMulti driver so users can install it offline — the installer prefers this copy
      # (Bundled/VMulti.Driver.zip next to the app) and only downloads as a fallback (#364).
      - name: Bundle the VMulti driver for offline install
        shell: pwsh
        run: |
          $dest = "publish/OpenTabletArtist/Bundled"
          New-Item -ItemType Directory -Force $dest | Out-Null
          Invoke-WebRequest -Uri "https://github.com/X9VoiD/vmulti-bin/releases/download/v1.0/VMulti.Driver.zip" -OutFile "$dest/VMulti.Driver.zip"

      # Strip all debug symbols (.pdb) from the bundle — end users don't need them, and they're huge:
      # the native libSkiaSharp.pdb / libHarfBuzzSharp.pdb alone are ~100 MB (they ship in the
      # SkiaSharp/HarfBuzz NuGet packages, so -p:DebugType=none doesn't touch them). Managed and native
      # symbols across the app + daemon come to well over half the uncompressed payload.
      - name: Strip debug symbols (.pdb)
        shell: pwsh
        run: |
          $pdbs = Get-ChildItem publish/OpenTabletArtist -Recurse -Filter *.pdb
          $mb = [math]::Round(($pdbs | Measure-Object Length -Sum).Sum / 1MB, 1)
          $pdbs | Remove-Item -Force
          Write-Host "Removed $($pdbs.Count) .pdb file(s), $mb MB"

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path publish/OpenTabletArtist/* -DestinationPath ${{ steps.ver.outputs.zip }} -Force

      # Build descriptive release notes from the commit messages since the previous tag. Each commit's
      # subject becomes a heading and its body is included verbatim (minus the Co-Authored-By trailer and
      # the "chore: bump version" bump commit), so well-written commit messages carry straight into the
      # changelog. Falls back to GitHub's auto-generated notes if there's no previous tag / no history.
      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          $tag = '${{ steps.ver.outputs.tag }}'
          $notesFile = Join-Path $env:RUNNER_TEMP 'RELEASE_NOTES.md'
          $prev = (git describe --tags --abbrev=0 "$tag^" 2>$null)
          $useGenerated = $true
          if ($LASTEXITCODE -eq 0 -and $prev) {
            $hashes = git log --no-merges --format='%H' "$prev..$tag"
            $sections = foreach ($h in $hashes) {
              $subject = (git show -s --format='%s' $h).Trim()
              if ($subject -match '^chore: bump version') { continue }
              $bodyRaw = git show -s --format='%b' $h
              $bodyLines = ($bodyRaw -split "`n") | Where-Object { $_ -notmatch '^\s*Co-Authored-By:' }
              $bodyText = (($bodyLines -join "`n").Trim())
              if ($bodyText) { "### $subject`n`n$bodyText" } else { "### $subject" }
            }
            if ($sections) {
              $repo = '${{ github.repository }}'
              $body = "## What's changed`n`n" + ($sections -join "`n`n") +
                      "`n`n**Full Changelog**: https://github.com/$repo/compare/$prev...$tag"
              Set-Content -Path $notesFile -Value $body -Encoding utf8
              $useGenerated = $false
              Write-Host "Generated notes from $prev..$tag ($($sections.Count) commit section(s))"
            }
          }
          "file=$notesFile" >> $env:GITHUB_OUTPUT
          "useGenerated=$useGenerated" >> $env:GITHUB_OUTPUT

      - name: Create release & upload asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.ver.outputs.tag }}'
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            if ('${{ steps.notes.outputs.useGenerated }}' -eq 'False') {
              gh release create $tag --title "OpenTabletArtist $tag" --notes-file '${{ steps.notes.outputs.file }}'
            } else {
              gh release create $tag --title "OpenTabletArtist $tag" --generate-notes
            }
          }
          gh release upload $tag '${{ steps.ver.outputs.zip }}' --clobber
