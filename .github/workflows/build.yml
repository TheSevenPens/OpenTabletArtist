name: build

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-test:
    # Windows is the shipping platform. The Linux lane guards against Windows-only assumptions creeping
    # back in (hardcoded '\' / '.exe' paths, unguarded P/Invoke, CA1416). The macOS lane is the actual
    # target platform for the port — it builds the daemon + app + tests on macOS as each phase lands (#140).
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (with OpenTabletDriver submodule)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # Card-roles guard (#574): the shared Border.GlassPanel escape-hatch class was removed; every card
      # must declare a role — Section (grouping) / Alert (severity) / SelectableCard (pickable). Fail the
      # build if a bare GlassPanel class creeps back in.
      - name: Guard removed card escape-hatch class
        shell: bash
        run: |
          if grep -rn 'Classes="GlassPanel"' --include='*.axaml' OpenTabletArtist; then
            echo "::error::A card escape-hatch class was reintroduced (#574) — use Section / Alert / SelectableCard instead."
            exit 1
          fi

      - name: Set up .NET (daemon targets net8.0, app targets net10.0)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      # Builds the whole solution: the OTD daemon (from the submodule) + the app + tests.
      - name: Build
        run: dotnet build OpenTabletArtist.slnx -c Debug

      # The unit tests are headless — they exercise Domain/ViewModel logic without creating windows or
      # rendering, so no display/xvfb is needed (they run the same way on the Windows lane).
      - name: Test
        run: dotnet test tests/OpenTabletArtist.Tests/OpenTabletArtist.Tests.csproj -c Debug --no-build
