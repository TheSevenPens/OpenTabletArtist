name: build

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout (with OpenTabletDriver submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET (daemon targets net8.0, app targets net10.0)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      # Builds the whole solution: the OTD daemon (from the submodule) + the app + tests.
      - name: Build
        run: dotnet build OTDWindowsHelper.slnx -c Debug

      - name: Test
        run: dotnet test tests/OtdWindowsHelper.Tests/OtdWindowsHelper.Tests.csproj -c Debug --no-build
